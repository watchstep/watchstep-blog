{{ define "main" }}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <article class="post-content">
      {{ with .Params.headline -}}
        <h1>{{ . }}</h1>
      {{ else -}}
        <h1>{{ .Title }}</h1>
      {{ end -}}

      {{ with .Params.summary -}}
        <p class="lead">{{ . }}</p>
      {{ end -}}

      {{ partial "main/post-meta.html" . }}

      {{ .Content }}
    </article>
  </div>
</div>
{{ end }}
