{{ define "main" }}
  <div class="container">
    <article class="post-page mx-auto">
      <header class="post-header">
        <h1>{{ .Title }}</h1>

        {{ with or .Params.lead .Params.summary .Description }}
          <p class="lead">{{ . }}</p>
        {{ end }}

        {{ partial "main/post-meta.html" . }}
      </header>

      <div class="post-content">
        {{ .Content }}
      </div>
    </article>
  </div>
{{ end }}
